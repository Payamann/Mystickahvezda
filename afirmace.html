    <meta property="og:title" content="Denní afirmace pro váš horoskop | Mystická Hvězda">

        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap&subset=latin,latin-ext"

        rel="stylesheet"  >
  <noscript><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap&subset=latin,latin-ext" rel="stylesheet"></noscript>

    <link rel="stylesheet" href="css/style.v2.min.css?v=9">

    <style>

        .zodiac-grid {

            display: grid;

            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));

            gap: 0.75rem;

            max-width: 700px;

            margin: 2rem auto;

        }



        .zodiac-btn {

            background: rgba(255, 255, 255, 0.04);

            border: 1px solid rgba(255, 255, 255, 0.1);

            border-radius: 14px;

            padding: 0.9rem 0.5rem;

            cursor: pointer;

            transition: all 0.25s;

            text-align: center;

            color: rgba(255, 255, 255, 0.75);

            font-size: 0.82rem;

            font-family: inherit;

        }



        .zodiac-btn:hover,

        .zodiac-btn.active {

            background: rgba(155, 89, 182, 0.15);

            border-color: rgba(155, 89, 182, 0.5);

            color: white;

            transform: translateY(-2px);

        }



        .zodiac-btn span {

            display: block;

            font-size: 1.8rem;

            margin-bottom: 0.3rem;

        }



        .affirmation-card {

            max-width: 600px;

            margin: 2.5rem auto 0;

            padding: 2.5rem 2rem;

            border-radius: 24px;

            text-align: center;

            border: 1px solid rgba(212, 175, 55, 0.25);

            background: linear-gradient(135deg, rgba(30, 10, 60, 0.9), rgba(45, 15, 85, 0.7));

            display: none;

            animation: popIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);

        }



        .affirmation-card.show {

            display: block;

        }



        @keyframes popIn {

            from {

                opacity: 0;

                transform: scale(0.9)

            }



            to {

                opacity: 1;

                transform: scale(1)

            }

        }



        .moon-badge {

            display: inline-block;

            padding: 0.3rem 0.85rem;

            border-radius: 50px;

            background: rgba(212, 175, 55, 0.1);

            border: 1px solid rgba(212, 175, 55, 0.25);

            color: #d4af37;

            font-size: 0.8rem;

            margin-bottom: 1.25rem;

        }



        .affirmation-text {

            font-family: 'Cinzel', serif;

            font-size: clamp(1.1rem, 3vw, 1.4rem);

            color: white;

            line-height: 1.7;

            margin: 1rem 0 1.5rem;

            font-style: italic;

        }



        .affirmation-sub {

            color: rgba(255, 255, 255, 0.55);

            font-size: 0.9rem;

            line-height: 1.6;

        }

    </style>

  <!-- DOMPurify for XSS protection (must load synchronously before other scripts use it) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.7/purify.min.js"></script>
</head>



<body>

    <div class="stars" aria-hidden="true"></div>

    <div id="header-placeholder"></div>



    <main>

        <section class="section" style="padding-top:5rem;text-align:center;">

            <div class="container">

                <div data-animate>

                    <span class="section__badge">Každý den nová</span>

                    <h1 class="section__title">Denní <span class="text-gradient">Afirmace</span></h1>

                    <p class="section__text">Vyberte své znamení a získejte dnešní osobní afirmaci naladěnou na hvězdy.

                    </p>

                </div>



                <!-- Výběr znamení -->

                <div class="zodiac-grid" data-animate>

                    <button class="zodiac-btn" data-sign="beran"

                        aria-label="Beran"><span>♈</span>Beran</button>

                    <button class="zodiac-btn" data-sign="byk"

                        aria-label="Byk"><span>♉</span>Byk</button>

                    <button class="zodiac-btn" data-sign="blizenci"

                        aria-label="Blíženci"><span>♊</span>Blíženci</button>

                    <button class="zodiac-btn" data-sign="rak"

                        aria-label="Rak"><span>♋</span>Rak</button>

                    <button class="zodiac-btn" data-sign="lev"

                        aria-label="Lev"><span>♌</span>Lev</button>

                    <button class="zodiac-btn" data-sign="panna"

                        aria-label="Panna"><span>♍</span>Panna</button>

                    <button class="zodiac-btn" data-sign="vahy"

                        aria-label="Váhy"><span>♎</span>Váhy</button>

                    <button class="zodiac-btn" data-sign="stir"

                        aria-label="Štír"><span>♏</span>Štír</button>

                    <button class="zodiac-btn" data-sign="strelec"

                        aria-label="Střelec"><span>♐</span>Střelec</button>

                    <button class="zodiac-btn" data-sign="kozoroh"

                        aria-label="Kozoroh"><span>♑</span>Kozoroh</button>

                    <button class="zodiac-btn" data-sign="vodnar"

                        aria-label="Vodnář"><span>♒</span>Vodnář</button>

                    <button class="zodiac-btn" data-sign="ryby"

                        aria-label="Ryby"><span>♓</span>Ryby</button>

                </div>



                <!-- Karta s afirmací -->

                <div class="affirmation-card" id="affirmation-card">

                    <div class="moon-badge" id="moon-badge">🌙 Fáze Měsíce</div>

                    <div id="sign-emoji" style="font-size:3.5rem;margin-bottom:0.5rem;"></div>

                    <div id="sign-name"

                        style="font-family:'Cinzel',serif;color:#d4af37;font-size:0.95rem;letter-spacing:2px;margin-bottom:1rem;">

                    </div>

                    <p class="affirmation-text" id="affirmation-text"></p>

                    <p class="affirmation-sub" id="affirmation-sub"></p>

                    <div style="margin-top:1.5rem;display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">

                        <button id="btn-copy-affirmation" class="btn btn--ghost"

                            style="font-size:0.88rem;padding:0.6rem 1.25rem;">📋 Kopírovat</button>

                        <button id="btn-share-affirmation" class="btn btn--ghost"

                            style="font-size:0.88rem;padding:0.6rem 1.25rem;">📤 Sdílet</button>

                        <a id="btn-horoskop-link" href="horoskopy.html" class="btn btn--primary"

                            style="font-size:0.88rem;padding:0.6rem 1.25rem;">🌌 Horoskop dnes</a>

                    </div>

                    <p id="copy-confirm" style="color:#2ed573;font-size:0.85rem;margin-top:0.75rem;display:none;">✓

                        Zkopírováno!</p>

                </div>



                <!-- CTA -->

                <div style="margin-top:4rem;padding:2rem;background:rgba(155,89,182,0.08);border:1px solid rgba(155,89,182,0.2);border-radius:16px;max-width:600px;margin-left:auto;margin-right:auto;"

                    data-animate>

                    <p style="color:rgba(255,255,255,0.7);margin-bottom:1rem;">Chcete afirmace každé ráno přímo do

                        e-mailu, spolu s personalizovaným horoskopem?</p>

                    <a href="cenik.html" class="btn btn--primary">✨ Vyzkoušet Premium — 7 dní zdarma</a>

                </div>

            </div>

        </section>

    </main>
