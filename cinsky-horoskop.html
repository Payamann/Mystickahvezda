        const order = ['krysa', 'buvol', 'tygr', 'zajic', 'drak', 'had', 'kun', 'koza', 'opice', 'kohout', 'pes', 'prase'];

        function getAnimalByYear(year) {
            const idx = ((year - 1900) % 12 + 12) % 12;
            return order[idx];
        }

        function calculateAnimal() {
            const input = document.getElementById('birth-year');
            input.style.borderColor = ''; // reset stylovani
            const year = parseInt(input.value);
            if (!year || year < 1900 || year > 2100) {
                input.style.borderColor = 'rgba(231,76,60,0.8)'; // upozornení pokud je datum mimo
                return;
            }
            const slug = getAnimalByYear(year);
            showAnimal(slug);
        }

        window.showAnimal = function (slug) {
            const data = animals[slug];
            if (!data) return;

            document.querySelectorAll('.animal-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + slug)?.classList.add('active');

            const hero = document.getElementById('result-hero');
            hero.style.background = 'linear-gradient(135deg, rgba(212,175,55,0.1), rgba(155,89,182,0.1))';
            hero.style.border = '1px solid rgba(212,175,55,0.25)';

            document.getElementById('result-emoji').textContent = data.emoji;
            document.getElementById('result-name').textContent = data.name;
            document.getElementById('result-years').textContent = 'Roky: ' + data.years;
            document.getElementById('result-element').textContent = '🌿 Živel: ' + data.element;
            document.getElementById('result-desc').textContent = data.desc;
            document.getElementById('result-love').textContent = data.love;
            document.getElementById('result-career').textContent = data.career;
            document.getElementById('result-2026').textContent = data.y2026;

            document.getElementById('compat-good').innerHTML = data.good.map(a =>
                `<span class="compat-badge compat-good">${a}</span>`).join('');
            document.getElementById('compat-bad').innerHTML = data.bad.map(a =>
                `<span class="compat-badge compat-bad">${a}</span>`).join('');

            const result = document.getElementById('result-section');
            result.classList.add('show');
            result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };

        document.getElementById('birth-year').addEventListener('keydown', e => {
            if (e.key === 'Enter') calculateAnimal();
        });
    </script>
</body>

</html>
