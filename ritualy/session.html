<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
  <link rel="apple-touch-icon" href="../img/icon-192.webp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rituální Seance | Mystická Hvězda</title>
    <meta name="description" content="Vedená lunární meditace — 6 kroků pro propojení s energií Měsíce.">
    <meta name="robots" content="noindex, follow">
        <link rel="stylesheet" href="/fonts/local-fonts.css">
        <link rel="stylesheet" href="../css/pages/ritualy-session.css">
<link rel="canonical" href="https://www.mystickahvezda.cz/ritualy/">

    <!-- Fonts -->

<!-- DOMPurify -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.7/purify.min.js" integrity="sha384-XQqX/4yiUGu+oyr87jvWzRuqBUK/adrY0DunhL+tID9m/9dwSpV8h9Fk/Sg6ifVQ" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="/js/dist/analytics-init.js" defer></script>
</head>
<body>
    <div class="session-overlay" aria-hidden="true"></div>
    <div class="stars-bg" aria-hidden="true"></div>
    <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>

    <!-- Header strip -->
    <header class="session-header">
        <a href="index.html">← Zpět na rituály</a>
        <span class="session-step-counter" id="step-counter" aria-live="polite">Příprava</span>
        <span class="session-ritual-name" id="header-ritual-name"></span>
    </header>

    <main class="session-main" id="session-main" aria-live="polite">

        <!-- ── SVÍČKA (vždy přítomná) ───────────────────── -->
        <div class="candle-wrap" aria-hidden="true">
            <div class="candle-flame"></div>
            <div class="candle-body"></div>
        </div>

        <!-- ══ SCREEN: BEFORE CHECK-IN ════════════════════ -->
        <div class="screen active" id="screen-checkin-before">
            <p class="checkin-title">Jak se nyní cítíš?</p>
            <p class="checkin-sub">Před začátkem rituálu</p>
            <div class="emoji-row" role="group" aria-label="Výběr nálady před rituálem">
                <button class="emoji-btn" data-mood="1" aria-label="Unavený/á">😔</button>
                <button class="emoji-btn" data-mood="2" aria-label="Neutrální">😐</button>
                <button class="emoji-btn" data-mood="3" aria-label="Klidný/á">😌</button>
                <button class="emoji-btn" data-mood="4" aria-label="Dobrý/á">🌟</button>
                <button class="emoji-btn" data-mood="5" aria-label="Skvělý/á">✨</button>
            </div>
        </div>

        <!-- ══ SCREEN: KROKY 1–6 ══════════════════════════ -->
        <div class="screen" id="screen-step">
            <!-- Krok 1: dechový průvodce -->
            <div id="breath-container" class="mh-inline-9aead1b566">
                <div class="breath-guide" id="breath-circle" aria-hidden="true">
                    <span class="breath-counter" id="breath-counter">3</span>
                </div>
                <div class="breath-label" id="breath-label" aria-live="polite">Nadechněte se…</div>
            </div>

            <div class="step-label" id="step-label">Krok 1 / 6</div>
            <h2 class="step-title" id="step-title">Uzemění</h2>
            <div class="step-text" id="step-text"></div>
            <p class="step-subtext" id="step-subtext"></p>

            <button class="btn-next" id="btn-next" aria-label="Pokračovat na další krok">
                Jsem připraven/a ›
            </button>
        </div>

        <!-- ══ SCREEN: AFTER CHECK-IN ══════════════════════ -->
        <div class="screen" id="screen-checkin-after">
            <p class="checkin-title">Jak se cítíš nyní?</p>
            <p class="checkin-sub">Po dokončení rituálu</p>
            <div class="emoji-row" role="group" aria-label="Výběr nálady po rituálu">
                <button class="emoji-btn" data-mood="1" aria-label="Unavený/á">😔</button>
                <button class="emoji-btn" data-mood="2" aria-label="Neutrální">😐</button>
                <button class="emoji-btn" data-mood="3" aria-label="Klidný/á">😌</button>
                <button class="emoji-btn" data-mood="4" aria-label="Dobrý/á">🌟</button>
                <button class="emoji-btn" data-mood="5" aria-label="Skvělý/á">✨</button>
            </div>
        </div>

        <!-- ══ SCREEN: COMPLETION ══════════════════════════ -->
        <div class="screen" id="screen-completion">
            <div class="completion-icon">✦</div>
            <h2 class="completion-title">Rituál dokončen</h2>
            <p class="mh-inline-5f069ec654" id="completion-subtitle"></p>

            <!-- Posun nálady -->
            <div class="mood-shift mh-inline-9aead1b566" id="mood-shift" aria-label="Posun nálady"></div>

            <!-- Streak -->
            <div class="streak-badge" id="streak-badge">
                <div class="streak-number" id="streak-number">1</div>
                <div class="streak-label" id="streak-label">rituál v řadě 🔥</div>
            </div>

            <!-- Journaling -->
            <div class="journal-section" id="journal-section">
                <h3>✍ Zápisky z rituálu</h3>
                <div id="journal-prompts-list"></div>
                <textarea
                    class="journal-textarea"
                    id="journal-notes"
                    placeholder="Napište své myšlenky, pocity nebo odpovědi na otázky výše…"
                    rows="4"
                    maxlength="2000"
                ></textarea>
                <div id="journal-action"></div>
                <p class="journal-saved-msg" id="journal-saved">✓ Zápisky uloženy</p>
            </div>

            <!-- Crosslinks -->
            <div class="crosslinks">
                <a href="../tarot.html" class="crosslink-btn">🔮 Tarotový výklad</a>
                <a href="../lunace.html" class="crosslink-btn">🌙 Lunární fáze</a>
                <a href="../andelska-posta.html" class="crosslink-btn">💌 Andělská Pošta</a>
            </div>

            <a href="index.html" class="mh-inline-0959972fab">← Zpět na rituály</a>
        </div>

    </main>

    <script src="../js/dist/api-config.js?v=5"></script>
    <script src="../js/dist/templates.js"></script>
    <script src="../js/dist/auth-client.js?v=5"></script>
    <script src="../js/dist/ritualy-content.js"></script>
    <script src="../js/dist/ritualy-session.js"></script>
</body>
</html>
