    <style>

        .aura-orb {

            width: 200px;

            height: 200px;

            border-radius: 50%;

            margin: 0 auto 2rem;

            position: relative;

            display: none;

            animation: orbAppear 0.8s cubic-bezier(0.4, 0, 0.2, 1);

        }



        @keyframes orbAppear {

            from {

                opacity: 0;

                transform: scale(0.3)

            }



            to {

                opacity: 1;

                transform: scale(1)

            }

        }



        .aura-orb::before {

            content: '';

            position: absolute;

            inset: -20px;

            border-radius: 50%;

            opacity: 0.3;

            animation: pulse 3s ease-in-out infinite;

        }



        @keyframes pulse {



            0%,

            100% {

                transform: scale(1)

            }



            50% {

                transform: scale(1.1)

            }

        }



        .aura-orb.show {

            display: block;

        }



        .aura-result {

            max-width: 650px;

            margin: 0 auto;

            display: none;

            animation: fadeIn 0.5s ease;

        }



        .aura-result.show {

            display: block;

        }



        @keyframes fadeIn {

            from {

                opacity: 0;

                transform: translateY(20px)

            }



            to {

                opacity: 1;

                transform: translateY(0)

            }

        }



        .aura-detail-grid {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 1rem;

            margin-top: 1.5rem;

        }



        @media(max-width:500px) {

            .aura-detail-grid {

                grid-template-columns: 1fr;

            }

        }



        .aura-detail-card {

            background: rgba(255, 255, 255, 0.04);

            border: 1px solid rgba(255, 255, 255, 0.08);

            border-radius: 14px;

            padding: 1.1rem;

        }



        .aura-detail-card h4 {

            color: #d4af37;

            font-size: 0.8rem;

            letter-spacing: 1px;

            margin-bottom: 0.4rem;

            text-transform: uppercase;

        }



        .birth-input {

            padding: 0.9rem 1.25rem;

            background: rgba(255, 255, 255, 0.06);

            border: 1px solid rgba(255, 255, 255, 0.12);

            border-radius: 12px;

            color: white;

            font-size: 1rem;

            font-family: 'Inter', sans-serif;

            outline: none;

            width: 100%;

            box-sizing: border-box;

        }



        .birth-input:focus {

            border-color: rgba(212, 175, 55, 0.5);

        }



        .birth-input::-webkit-calendar-picker-indicator {

            filter: invert(1);

        }

    </style>

    <div class="stars" aria-hidden="true"></div>

    <main>

        <section class="section" style="padding-top:5rem;text-align:center;">

            <div class="container" style="max-width:700px;">

                <div data-animate>

                    <span class="section__badge">Numerologický výpočet</span>

                <div style="max-width:340px;margin:2.5rem auto;" data-animate>

                        style="display:block;color:rgba(255,255,255,0.5);font-size:0.85rem;margin-bottom:0.5rem;">Datum

                        narození</label>

                    <button id="btn-aura-calc" class="btn btn--primary"

                <!-- Výsledek -->

                    <h2 id="aura-title" style="font-family:'Cinzel',serif;font-size:2rem;margin-bottom:0.25rem;"></h2>

                    <p id="aura-keyword" style="color:#d4af37;font-size:1rem;letter-spacing:2px;margin-bottom:1.5rem;">

                    </p>

                    <p id="aura-desc"

                        style="color:rgba(255,255,255,0.8);line-height:1.8;font-size:1rem;margin-bottom:1rem;"></p>



                    <div class="aura-detail-grid">

                        </div>

                        <div class="aura-detail-card">

                            <h4>🌱 Výzvy</h4>

                            <p id="aura-challenges"

                                style="color:rgba(255,255,255,0.75);font-size:0.9rem;line-height:1.6;"></p>

                        </div>

                        <div class="aura-detail-card">

                            <h4>💎 Krystal</h4>

                            <p id="aura-crystal" style="color:rgba(255,255,255,0.75);font-size:0.9rem;"></p>

                        </div>

                        <div class="aura-detail-card">

                            <h4>🌀 Čakra</h4>

                            <p id="aura-chakra" style="color:rgba(255,255,255,0.75);font-size:0.9rem;"></p>

                        </div>

                    </div>

                    <div class="aura-detail-card" style="margin-top:1rem;text-align:left;">

                        <h4>💼 Povolání a životní mise</h4>

                    </div>



                    <div style="margin-top:2rem;display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">
