<html lang="cs">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>*</text></svg>">
<link rel="apple-touch-icon" href="img/icon-192.webp">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>Andělská pošta — Napište vzkaz andělům | Mystická Hvězda</title>

    <meta name="description"

        content="Napište svůj vzkaz, přání nebo prosbu andělům. Andělská pošta — sdílejte svá přání s ostatními a inspirujte se duchovním společenstvím.">

    <link rel="canonical" href="https://www.mystickahvezda.cz/andelska-posta.html">

    <meta property="og:title" content="Andělská pošta — Vzkaz andělům | Mystická Hvězda">

    <meta property="og:description" content="Napište svůj vzkaz andělům. Komunita duchovních hledačů.">

    <meta property="og:image" content="https://www.mystickahvezda.cz/img/hero-3d.webp">

    <link rel="stylesheet" href="/fonts/local-fonts.css">
    <link rel="stylesheet" href="css/style.v2.min.css?v=11">
    <link rel="stylesheet" href="css/pages/andelska-posta.css">
<!-- DOMPurify for XSS protection (must load synchronously before other scripts use it) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.7/purify.min.js" integrity="sha384-XQqX/4yiUGu+oyr87jvWzRuqBUK/adrY0DunhL+tID9m/9dwSpV8h9Fk/Sg6ifVQ" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "Andělská pošta — Komunitní vzkazy andělům",
        "description": "Sdílejte své andělské vzkazy s komunitou Mystické Hvězdy. Inspirujte se duchovními zprávami ostatních.",
        "url": "https://www.mystickahvezda.cz/andelska-posta.html",
        "isPartOf": {
            "@type": "WebSite",
            "name": "Mystická Hvězda",
            "url": "https://www.mystickahvezda.cz"
        }
    }
    </script>
    <script src="/js/dist/analytics-init.js" defer></script>
</head>

<body>

    <div class="stars" aria-hidden="true"></div>

    <div id="header-placeholder"></div>

    <main>

        <section class="section mh-inline-fe157fd9e5">

            <div class="container">

                <div data-animate>

                    <span class="section__badge">Duchovní komunita</span>

                    <h1 class="section__title">Andělská <span class="text-gradient">Pošta</span></h1>

                    <p class="section__text">Napište vzkaz, přání nebo prosbu andělům. Ostatní jej uvidí a podpoří svým

                        srdíčkem.</p>

                </div>

                <!-- Formulář -->

                <div class="message-form" data-animate>

                    <div class="mh-inline-d768660cf3">

                        <label for="msg-nickname"

                            class="mh-inline-ed21604022">Vaše

                            přezdívka (nepovinné)</label>

                        <input type="text" id="msg-nickname" class="form-input" placeholder="Anonym" maxlength="30"

                            aria-label="Přezdívka">

                    </div>

                    <div class="mh-inline-3460e39b22">

                        <label for="msg-text"

                            class="mh-inline-ed21604022">Váš

                            vzkaz andělům</label>

                        <textarea id="msg-text" class="form-input" placeholder="Drazí andělé, prosím vás o..."

                            maxlength="500" aria-label="Vzkaz andělům"></textarea>

                        <div class="char-counter"><span id="char-count">0</span>/500</div>

                    </div>

                    <div class="mh-inline-d768660cf3">

                        <label

                            class="mh-inline-ed21604022">Kategorie</label>

                        <select id="msg-category" class="form-input" aria-label="Kategorie vzkazu">

                            <option value="laska">❤️ Láska a vztahy</option>

                            <option value="zdravi">🩺 Zdraví a uzdravení</option>

                            <option value="kariera">💼 Kariéra a finance</option>

                            <option value="rodina">🏠 Rodina a domov</option>

                            <option value="dek">🙏 Vděčnost</option>

                            <option value="jine">✨ Jiné</option>

                        </select>

                    </div>

                    <button id="btn-submit-msg" class="btn btn--primary submit-btn">👼 Odeslat andělům</button>

                    <p id="submit-msg"

                        class="mh-inline-f423340941"></p>

                </div>

                <!-- Nástěnka -->

                <div class="messages-wall">

                    <h2

                        class="mh-inline-30d4d9591a">

                        ✨ Nedávné vzkazy komunity</h2>

                    <div id="messages-container">

                        <!-- Schválené vzkazy se načítají z API. -->

                    </div>

                </div>

            </div>

        </section>

    </main>

    <div id="footer-placeholder"></div>

    <script src="js/dist/api-config.js?v=5" defer></script>

    <script src="js/dist/templates.js" defer></script>
    <script src="js/dist/auth-client.js?v=5" defer></script>
<script src="js/dist/auth-copy-fixes.js" defer></script>
    <script src="js/dist/secondary-pages-copy-fixes.js" defer></script>

    <script src="js/dist/components.js?v=10" defer></script>

    

    <script src="js/dist/exit-intent.js" defer></script>

    <script type="module" src="js/dist/main.js?v=10"></script>

    <script src="js/dist/angel-post.js" defer></script>
    <script src="js/dist/share-result.js" defer></script>

</body>

</html>
