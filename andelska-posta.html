<!DOCTYPE html>

<html lang="cs">



<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Andělská pošta — Napište vzkaz andělům | Mystická Hvězda</title>

    <meta name="description"

        content="Napište svůj vzkaz, přání nebo prosbu andělům. Andělská pošta — sdílejte svá přání s ostatními a inspirujte se duchovním společenstvím.">

    <link rel="canonical" href="https://mystickahvezda.cz/andelska-posta.html">

    <meta property="og:title" content="Andělská pošta — Vzkaz andělům | Mystická Hvězda">

    <meta property="og:description" content="Napište svůj vzkaz andělům. Komunita duchovních hledačů.">

    <meta property="og:image" content="https://mystickahvezda.cz/img/hero-3d.webp">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link

        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap&subset=latin,latin-ext"

        rel="stylesheet"  >
  <noscript><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap&subset=latin,latin-ext" rel="stylesheet"></noscript>

    <link rel="stylesheet" href="css/style.v2.min.css?v=9">

    <style>

        .message-form {

            max-width: 580px;

            margin: 0 auto;

            background: rgba(255, 255, 255, 0.03);

            border: 1px solid rgba(255, 255, 255, 0.08);

            border-radius: 20px;

            padding: 2rem;

        }



        .form-input {

            width: 100%;

            padding: 0.85rem 1.1rem;

            background: rgba(255, 255, 255, 0.06);

            border: 1px solid rgba(255, 255, 255, 0.1);

            border-radius: 12px;

            color: white;

            font-family: 'Inter', sans-serif;

            font-size: 0.95rem;

            outline: none;

            box-sizing: border-box;

            transition: border-color 0.2s;

        }



        .form-input:focus {

            border-color: rgba(212, 175, 55, 0.45);

        }



        textarea.form-input {

            resize: vertical;

            min-height: 120px;

        }



        .messages-wall {

            max-width: 700px;

            margin: 3rem auto 0;

        }



        .message-card {

            background: rgba(255, 255, 255, 0.03);

            border: 1px solid rgba(255, 255, 255, 0.07);

            border-radius: 16px;

            padding: 1.25rem 1.5rem;

            margin-bottom: 1rem;

            position: relative;

            animation: fadeIn 0.4s ease;

        }



        .message-card:hover {

            border-color: rgba(212, 175, 55, 0.2);

        }



        @keyframes fadeIn {

            from {

                opacity: 0;

                transform: translateY(10px)

            }



            to {

                opacity: 1;

                transform: translateY(0)

            }

        }



        .message-meta {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 0.6rem;

            font-size: 0.8rem;

            color: rgba(255, 255, 255, 0.3);

        }



        .message-text {

            color: rgba(255, 255, 255, 0.82);

            line-height: 1.7;

            font-size: 0.95rem;

            font-style: italic;

        }



        .heart-btn {

            background: none;

            border: none;

            cursor: pointer;

            color: rgba(255, 255, 255, 0.3);

            font-size: 1rem;

            padding: 0.3rem 0.6rem;

            transition: color 0.2s;

            border-radius: 8px;

        }



        .heart-btn:hover {

            color: #e74c3c;

        }



        .heart-btn:active {

            transform: scale(1.2);

            transition: transform 0.1s;

        }



        .heart-btn.liked {

            color: #e74c3c;

        }



        .category-tag {

            display: inline-block;

            padding: 0.2rem 0.6rem;

            border-radius: 50px;

            font-size: 0.75rem;

            background: rgba(155, 89, 182, 0.15);

            border: 1px solid rgba(155, 89, 182, 0.25);

            color: rgba(155, 89, 182, 0.8);

            margin-right: 0.3rem;

        }



        .submit-btn {

            width: 100%;

            margin-top: 1rem;

        }



        .char-counter {

            font-size: 0.78rem;

            color: rgba(255, 255, 255, 0.3);

            text-align: right;

            margin-top: 0.3rem;

        }

    </style>

  <!-- DOMPurify for XSS protection (must load synchronously before other scripts use it) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.7/purify.min.js"></script>
</head>



<body>

    <div class="stars" aria-hidden="true"></div>

    <div id="header-placeholder"></div>



    <main>

        <section class="section" style="padding-top:5rem;text-align:center;">

            <div class="container">

                <div data-animate>

                    <span class="section__badge">Duchovní komunita</span>

                    <h1 class="section__title">Andělská <span class="text-gradient">Pošta</span></h1>

                    <p class="section__text">Napište vzkaz, přání nebo prosbu andělům. Ostatní jej uvidí a podpoří svým

                        srdíčkem.</p>

                </div>



                <!-- Formulář -->

                <div class="message-form" data-animate>

                    <div style="margin-bottom:1rem;">

                        <label for="msg-nickname"

                            style="display:block;color:rgba(255,255,255,0.5);font-size:0.82rem;margin-bottom:0.4rem;">Vaše

                            přezdívka (nepovinné)</label>

                        <input type="text" id="msg-nickname" class="form-input" placeholder="Anonym" maxlength="30"

                            aria-label="Přezdívka">

                    </div>

                    <div style="margin-bottom:0.25rem;">

                        <label for="msg-text"

                            style="display:block;color:rgba(255,255,255,0.5);font-size:0.82rem;margin-bottom:0.4rem;">Váš

                            vzkaz andělům</label>

                        <textarea id="msg-text" class="form-input" placeholder="Drazí andělé, prosím vás o..."

                            maxlength="500" aria-label="Vzkaz andělům"></textarea>

                        <div class="char-counter"><span id="char-count">0</span>/500</div>

                    </div>

                    <div style="margin-bottom:1rem;">

                        <label

                            style="display:block;color:rgba(255,255,255,0.5);font-size:0.82rem;margin-bottom:0.4rem;">Kategorie</label>

                        <select id="msg-category" class="form-input" aria-label="Kategorie vzkazu">

                            <option value="laska">❤️ Láska a vztahy</option>

                            <option value="zdravi">💚 Zdraví a uzdravení</option>

                            <option value="kariera">💼 Kariéra a finance</option>

                            <option value="rodina">🏠 Rodina a domov</option>

                            <option value="dek">🙏 Vděčnost</option>

                            <option value="jine">✨ Jiné</option>

                        </select>

                    </div>

                    <button id="btn-submit-msg" class="btn btn--primary submit-btn">👼 Odeslat andělům</button>

                    <p id="submit-msg"

                        style="display:none;color:#2ed573;font-size:0.88rem;margin-top:0.75rem;text-align:center;"></p>

                </div>



                <!-- Nástěnka -->

                <div class="messages-wall">

                    <h2

                        style="font-family:'Cinzel',serif;color:#d4af37;font-size:1.2rem;margin-bottom:1.5rem;text-align:center;">

                        ✨ Nedávné vzkazy komunity</h2>

                    <div id="messages-container">

                        <!-- Ukázkové vzkazy (zobrazeny dokud nejsou skutečná data) -->

                    </div>

                </div>

            </div>

        </section>

    </main>



    <div id="footer-placeholder"></div>

    <script src="js/api-config.js?v=5" defer></script>

    <script src="js/auth-client.js?v=5" defer></script>

    <script src="js/components.js?v=10" defer></script>

    

    <script src="js/exit-intent.js" defer></script>

    <script type="module" src="js/main.js?v=10"></script>

    <script>

        const catLabels = { laska: '❤️ Láska', zdravi: '💚 Zdraví', kariera: '💼 Kariéra', rodina: '🏠 Rodina', dek: '🙏 Vděčnost', jine: '✨ Jiné' };



        // Demo messages (shown before backend is connected)

        const demoMessages = [

            { nickname: 'Monika', text: 'Drazí andělé, prosím vás o sílu a trpělivost v těžkém čase. Věřím, že vše dopadne dobře.', category: 'zdravi', likes: 23, created_at: new Date(Date.now() - 3600000) },

            { nickname: 'Anonym', text: 'Děkuji andělům za ochranu mé rodiny. Každý den cítím vaši přítomnost.', category: 'dek', likes: 47, created_at: new Date(Date.now() - 7200000) },

            { nickname: 'Lucie K.', text: 'Prosím o vedení v mém rozhodování o práci. Chci jít správnou cestou a přinést světu dobro.', category: 'kariera', likes: 18, created_at: new Date(Date.now() - 10800000) },

            { nickname: 'Tomáš', text: 'Andělé, sešlete mi do cesty správného člověka. Jsem připraven milovat a být milován.', category: 'laska', likes: 31, created_at: new Date(Date.now() - 18000000) },

            { nickname: 'Anonym', text: 'Modlím se za zdraví svých rodičů. Ať jsou obklopeni vaším světlem.', category: 'zdravi', likes: 52, created_at: new Date(Date.now() - 86400000) },

        ];



        let localMessages = [...demoMessages];

        let liked = new Set();

        try {

            const savedLikes = JSON.parse(localStorage.getItem('mh_angel_liked_ids') || '[]');

            liked = new Set(savedLikes);

        } catch (e) {

            liked = new Set();

        }



        // --- RENDER ---

        function renderMessages() {

            const wall = document.getElementById('messages-container'); // Changed to messages-container

            if (localMessages.length === 0) {

                wall.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);padding:2rem;">Zatím žádné vzkazy. Buďte první!</div>';

                return;

            }



            const html = localMessages.map((msg, i) => {

                // Generujeme chytřejší klíč pro paměť likes (ID ze serveru nebo jako fallback text zprávy)

                const msgKey = msg.id ? String(msg.id) : msg.text.substring(0, 20);

                const ago = timeAgo(msg.created_at);

                const cat = catLabels[msg.category] || '✨ Jiné';

                const isLiked = liked.has(msgKey);

                return `<div class="message-card">

                <div class="message-meta">

                    <span>👤 ${msg.nickname || 'Anonym'} <span class="category-tag">${cat}</span></span>

                    <span>${ago}</span>

                </div>

                <p class="message-text">"${msg.text}"</p>

                <div style="text-align:right;margin-top:0.5rem;">

                    <button class="heart-btn ${isLiked ? 'liked' : ''}" data-index="${i}" aria-label="Podpořit srdíčkem">

                        ${isLiked ? '❤️' : '🤍'} ${msg.likes}

                    </button>

                </div>

            </div>`;

            }).join('');



            wall.innerHTML = html;

        }



        function timeAgo(date) {

            const seconds = Math.floor((new Date() - new Date(date)) / 1000);

            if (seconds < 60) return 'právě teď';

            if (seconds < 3600) return `před ${Math.floor(seconds / 60)} min`;

            if (seconds < 86400) return `před ${Math.floor(seconds / 3600)} hod`;

            return `před ${Math.floor(seconds / 86400)} dny`;

        }



        function likeMessage(i) {

            const msg = localMessages[i];

            const msgKey = msg.id ? String(msg.id) : msg.text.substring(0, 20);



            if (liked.has(msgKey)) return;



            liked.add(msgKey);

            msg.likes++;

            localStorage.setItem('mh_angel_liked_ids', JSON.stringify([...liked]));



            // Rekreslení vizuálu

            renderMessages();



            // Try API pro permanentní vzestup do databáze
            if (msg.id) {
                (async () => {
                    const csrfToken = window.getCSRFToken ? await window.getCSRFToken() : null;
                    const baseUrl = window.API_CONFIG?.BASE_URL || '/api';
                    fetch(`${baseUrl}/angel-post/${localMessages[i].id}/like`, { 
                        method: 'POST',
                        headers: {
                            ...(csrfToken && { 'X-CSRF-Token': csrfToken })
                        }
                    }).catch(() => { });
                })();
            }
        };



        function updateCounter() {

            const el = document.getElementById('msg-text');

            if (el) {

                const len = el.value.length;

                document.getElementById('char-count').textContent = len;

            }

        }



        async function submitMessage() {

            const text = document.getElementById('msg-text').value.trim();

            const nickname = document.getElementById('msg-nickname').value.trim() || 'Anonym';

            const category = document.getElementById('msg-category').value;

            const msgEl = document.getElementById('submit-msg');



            if (text.length < 10) {

                document.getElementById('msg-text').style.borderColor = 'rgba(231,76,60,0.8)';

                msgEl.textContent = '❌ Váš vzkaz andělům musí mít alespoň 10 znaků.';

                msgEl.style.color = '#e74c3c';

                msgEl.style.display = 'block';

                setTimeout(() => { msgEl.style.display = 'none'; }, 4000);

                return;

            }



            document.getElementById('msg-text').style.borderColor = 'rgba(255,255,255,0.1)';



            const newMsg = { nickname, text, category, likes: 0, created_at: new Date() };



            // Try API first
            try {
                const csrfToken = window.getCSRFToken ? await window.getCSRFToken() : null;
                const baseUrl = window.API_CONFIG?.BASE_URL || '/api';
                const res = await fetch(`${baseUrl}/angel-post`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        ...(csrfToken && { 'X-CSRF-Token': csrfToken })
                    },
                    body: JSON.stringify({ nickname, message: text, category })
                });



                const data = await res.json();



                if (!res.ok) {

                    // Blokace spamu nebo limitu per den ze serveru (status 400 nebo 429)

                    msgEl.textContent = '❌ ' + (data.error || 'Nastala chyba při odesílání.');

                    msgEl.style.color = '#e74c3c';

                    msgEl.style.display = 'block';

                    setTimeout(() => { msgEl.style.display = 'none'; }, 5000);

                    return; // Zastavit vykresleni lokální simulace

                }



                if (data.id) newMsg.id = data.id;



            } catch (e) {

                // Skutecny vypadek serveru / offline u uzivatele (tichy prechod k lokalnimu zobrazeni)

                console.warn("AngelPost API offline, pouzivam lokalni rezim.", e);

            }



            localMessages.unshift(newMsg);

            renderMessages();



            document.getElementById('msg-text').value = '';

            document.getElementById('msg-nickname').value = '';

            document.getElementById('char-count').textContent = '0';



            msgEl.textContent = '✨ Váš vzkaz byl odeslán andělům!';

            msgEl.style.color = '#2ed573';

            msgEl.style.display = 'block';

            setTimeout(() => { msgEl.style.display = 'none'; }, 4000);



            // Odskrolovani dolu k prirozenemu pohledu na odeslany prispevek v ramci boardu

            setTimeout(() => {

                const wall = document.querySelector('.messages-wall');

                if (wall) {

                    const y = wall.getBoundingClientRect().top + window.scrollY - 100;

                    window.scrollTo({ top: y, behavior: 'smooth' });

                }

            }, 300);

        }



        // Load real messages from API

        async function loadMessages() {
            try {
                const baseUrl = window.API_CONFIG?.BASE_URL || '/api';
                const res = await fetch(`${baseUrl}/angel-post?limit=20`);
                if (res.ok) {

                    const data = await res.json();

                    if (data.length > 0) {

                        localMessages = [...data, ...demoMessages.slice(0, 3)];

                        renderMessages();

                    }

                }

            } catch (e) { /* use demo data */ }

        }



        renderMessages();

        loadMessages();



        document.addEventListener('DOMContentLoaded', () => {

            const btnSubmit = document.getElementById('btn-submit-msg');

            const msgInput = document.getElementById('msg-text');

            const messagesContainer = document.getElementById('messages-container');



            if (btnSubmit) {

                btnSubmit.addEventListener('click', submitMessage);

            }



            if (msgInput) {

                msgInput.addEventListener('input', updateCounter);

            }



            if (messagesContainer) {

                messagesContainer.addEventListener('click', (e) => {

                    const btn = e.target.closest('.heart-btn');

                    if (btn) {

                        const index = parseInt(btn.getAttribute('data-index'));

                        if (!isNaN(index)) {

                            // Pridavame animaci rucne, nebot classList je prepisovan funkci renderMessages

                            btn.style.transform = "scale(1.3)";

                            setTimeout(() => likeMessage(index), 100);

                        }

                    }

                });

            }

        });

    </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.7/purify.min.js"></script>
</body>



</html>
