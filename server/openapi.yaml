openapi: 3.0.0
info:
  title: Mystická Hvězda API
  description: API pro ezoterické služby, horoskopy a tarotové výklady.
  version: 1.0.0
servers:
  - url: http://localhost:3001/api
    description: Lokální vývojový server
  - url: https://www.mystickahvezda.cz/api
    description: Produkční server

paths:
  /config:
    get:
      summary: Veřejná klientská konfigurace
      description: Vrací pouze klientsky bezpečné veřejné klíče a nastavení.
      responses:
        '200':
          description: Klientská konfigurace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicConfig'

  /birth-locations:
    get:
      summary: Podporovaná místa narození
      description: Vrací klientsky bezpečný seznam měst, která lokální astro engine umí použít pro časové pásmo a domy.
      responses:
        '200':
          description: Seznam podporovaných míst narození.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  locations:
                    type: array
                    items:
                      $ref: '#/components/schemas/BirthLocationSuggestion'

  /crystal-ball:
    post:
      summary: Dotaz na křišťálovou kouli
      description: AI generovaná odpověď na konkrétní životní otázku.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                  maxLength: 1000
                history:
                  type: array
                  items:
                    type: string
                lang:
                  type: string
                  enum: [cs, sk, pl]
      responses:
        '200':
          description: Úspěšná odpověď
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  response:
                    type: string
        '400':
          description: Neplatný požadavek (např. chybějící otázka)
        '402':
          description: Limit vyčerpán (vyžaduje Premium)

  /push/subscribe:
    post:
      summary: Uložit Web Push subscription
      description: Uloží endpoint pro prohlížečové push notifikace. Přihlášený uživatel se spáruje podle JWT, anonymní subscription je povolená.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscription]
              properties:
                subscription:
                  $ref: '#/components/schemas/PushSubscription'
      responses:
        '200':
          description: Subscription byla uložena.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Neplatná subscription.
        '429':
          description: Příliš mnoho pokusů.

  /push/unsubscribe:
    post:
      summary: Zrušit Web Push subscription
      description: Smaže uložený push endpoint, aby odhlášení v prohlížeči nezůstalo jen lokálním stavem.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint:
                  type: string
                  maxLength: 2048
                subscription:
                  $ref: '#/components/schemas/PushSubscription'
      responses:
        '200':
          description: Subscription byla zrušena.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Neplatný endpoint.
        '429':
          description: Příliš mnoho pokusů.

  /natal-chart/calculate:
    get:
      summary: Výpočet natální karty bez AI interpretace
      description: Vrací serverově vypočtené planety, aspekty, dominantní elementy a při rozpoznaném místě také ascendent a whole-sign domy.
      parameters:
        - in: query
          name: birthDate
          required: true
          schema:
            type: string
            format: date
          description: Datum narození ve formátu YYYY-MM-DD.
        - in: query
          name: birthTime
          schema:
            type: string
            pattern: '^\\d{1,2}:\\d{2}$'
          description: Čas narození ve formátu HH:mm.
        - in: query
          name: birthPlace
          schema:
            type: string
            maxLength: 200
          description: Místo narození. Rozpoznaná města doplní časové pásmo a souřadnice.
        - in: query
          name: latitude
          schema:
            type: number
            minimum: -90
            maximum: 90
          description: Volitelná přesná šířka narození. Při kombinaci s longitude má přednost před lokální databází měst.
        - in: query
          name: longitude
          schema:
            type: number
            minimum: -180
            maximum: 180
          description: Volitelná přesná délka narození.
        - in: query
          name: timeZone
          schema:
            type: string
            maxLength: 100
          description: IANA časové pásmo pro přesné souřadnice, např. Europe/Prague. Bez validní hodnoty se čas bere jako UTC a ascendent/domy se pro souřadnice nepočítají.
        - in: query
          name: country
          schema:
            type: string
            maxLength: 30
        - in: query
          name: name
          schema:
            type: string
            maxLength: 100
      responses:
        '200':
          description: Vypočtená natální data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  chart:
                    $ref: '#/components/schemas/AstroChart'
        '400':
          description: Neplatné datum narození.

  /synastry/calculate:
    post:
      summary: Výpočet partnerské shody bez AI interpretace
      description: Vrací serverové synastrické skóre a křížové aspekty pro veřejný výpočet shody.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [person1, person2]
              properties:
                person1:
                  $ref: '#/components/schemas/BirthProfile'
                person2:
                  $ref: '#/components/schemas/BirthProfile'
      responses:
        '200':
          description: Vypočtená synastrická data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  synastry:
                    $ref: '#/components/schemas/SynastryCalculation'
        '400':
          description: Neplatná data narození.

  /transits/current:
    get:
      summary: Aktuální tranzity vůči natální mapě
      description: Vrací nejsilnější aktuální tranzitní aspekt bez AI interpretace.
      parameters:
        - in: query
          name: birthDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: birthTime
          schema:
            type: string
            pattern: '^\\d{1,2}:\\d{2}$'
        - in: query
          name: birthPlace
          schema:
            type: string
            maxLength: 200
        - in: query
          name: latitude
          schema:
            type: number
            minimum: -90
            maximum: 90
        - in: query
          name: longitude
          schema:
            type: number
            minimum: -180
            maximum: 180
        - in: query
          name: timeZone
          schema:
            type: string
            maxLength: 100
        - in: query
          name: country
          schema:
            type: string
            maxLength: 30
        - in: query
          name: name
          schema:
            type: string
            maxLength: 100
      responses:
        '200':
          description: Vypočtený tranzitní snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  transit:
                    $ref: '#/components/schemas/TransitSnapshot'
        '400':
          description: Neplatné datum narození.

  /astrocartography:
    post:
      summary: Symbolická astrokartografie
      description: Premium výklad relokační astrologie nad vypočtenou natální mapou, low-precision MC/IC meridiány a serverovým skóre doporučených míst. Vrstva doporučení stále není plná profesionální ASC/DSC mapová geometrie.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/BirthProfile'
                - type: object
                  properties:
                    intention:
                      type: string
                      maxLength: 200
                      description: Záměr cesty, např. kariera, laska, zdravi, duchovno nebo rodina.
      responses:
        '200':
          description: AI interpretace doplněná strukturovanými astro daty.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  response:
                    type: string
                  chart:
                    $ref: '#/components/schemas/AstroChart'
                  astrocartography:
                    $ref: '#/components/schemas/AstrocartographyInsights'
        '401':
          description: Neautorizováno.
        '403':
          description: Vyžaduje plán Osvícení nebo vyšší.
        '400':
          description: Neplatné datum narození.

  /dream:
    post:
      summary: Výklad snu (Lexikon snů)
      description: Výklad snu na základě popisu uživatele. Vyžaduje Premium.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dream:
                  type: string
                  maxLength: 3000
      responses:
        '200':
          description: Úspěšný výklad
        '401':
          description: Neautorizováno

  /admin/funnel:
    get:
      summary: Admin funnel report
      description: Monetization funnel report with daily buckets, source comparison and source + feature conversion segments. Requires admin access.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
          description: Number of days in the current reporting period.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 100
            maximum: 5000
            default: 1000
          description: Maximum number of funnel events used for the report.
        - in: query
          name: format
          schema:
            type: string
            enum: [json, csv]
          description: Use `csv` to export the daily funnel table.
        - in: query
          name: view
          schema:
            type: string
            enum: [daily, segments]
            default: daily
          description: CSV export view. `segments` exports source + feature conversion rows.
      responses:
        '200':
          description: Funnel report or CSV export.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  report:
                    $ref: '#/components/schemas/FunnelReport'
            text/csv:
              schema:
                type: string
        '401':
          description: Authentication required.
        '403':
          description: Admin privileges required.

  /analytics/event:
    post:
      summary: Record first-party analytics event
      description: Records a whitelisted browser or smoke-test event. Requires CSRF token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyticsEventRequest'
      responses:
        '200':
          description: Event accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsAck'
        '400':
          description: Invalid event name or payload.
        '403':
          description: CSRF token missing or invalid.

  /analytics/batch:
    post:
      summary: Record first-party analytics batch
      description: Records up to 10 whitelisted analytics events in one CSRF-protected request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyticsBatchRequest'
      responses:
        '200':
          description: Batch accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsAck'
        '400':
          description: No valid analytics events.
        '403':
          description: CSRF token missing or invalid.

  /admin/analytics:
    get:
      summary: Admin first-party analytics report
      description: First-party analytics report with daily trend, feedback summary and recent errors. Requires admin access.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 7
          description: Number of days in the reporting period.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 100
            maximum: 5000
            default: 1000
          description: Maximum number of analytics events used for the report.
        - in: query
          name: format
          schema:
            type: string
            enum: [json, csv]
          description: Use `csv` to export the daily analytics table.
      responses:
        '200':
          description: Analytics report or CSV export.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  report:
                    $ref: '#/components/schemas/AnalyticsReport'
            text/csv:
              schema:
                type: string
        '401':
          description: Authentication required.
        '403':
          description: Admin privileges required.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PublicConfig:
      type: object
      properties:
        stripePublishableKey:
          type: string
          nullable: true
        vapidPublicKey:
          type: string
          nullable: true
        sentryDsn:
          type: string
          nullable: true
        features:
          type: object
          properties:
            pushNotifications:
              type: boolean
    BirthLocationSuggestion:
      type: object
      properties:
        name:
          type: string
        country:
          type: string
    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
    PushSubscription:
      type: object
      required: [endpoint]
      properties:
        endpoint:
          type: string
          maxLength: 2048
        expirationTime:
          type: integer
          nullable: true
        keys:
          type: object
          properties:
            p256dh:
              type: string
            auth:
              type: string
    BirthProfile:
      type: object
      required: [birthDate]
      properties:
        name:
          type: string
          maxLength: 100
        birthDate:
          type: string
          format: date
        birthTime:
          type: string
          pattern: '^\\d{1,2}:\\d{2}$'
        birthPlace:
          type: string
          maxLength: 200
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
        timeZone:
          type: string
          maxLength: 100
        country:
          type: string
          maxLength: 30
    AstroChart:
      type: object
      properties:
        engine:
          type: object
          additionalProperties: true
        input:
          $ref: '#/components/schemas/BirthProfile'
        location:
          type: object
          nullable: true
          additionalProperties: true
        calculatedForUtc:
          type: string
          format: date-time
        planets:
          type: object
          additionalProperties: true
        aspects:
          type: array
          items:
            type: object
            additionalProperties: true
        houses:
          type: object
          additionalProperties: true
        summary:
          type: object
          additionalProperties: true
    SynastryCalculation:
      type: object
      properties:
        engine:
          type: object
          additionalProperties: true
        person1:
          type: object
          additionalProperties: true
        person2:
          type: object
          additionalProperties: true
        scores:
          type: object
          properties:
            total:
              type: integer
            emotion:
              type: integer
            communication:
              type: integer
            passion:
              type: integer
            stability:
              type: integer
        crossAspects:
          type: array
          items:
            type: object
            additionalProperties: true
        summary:
          type: object
          additionalProperties: true
    TransitSnapshot:
      type: object
      properties:
        engine:
          type: object
          additionalProperties: true
        current:
          type: object
          additionalProperties: true
        natal:
          type: object
          additionalProperties: true
        strongestAspect:
          type: object
          nullable: true
          additionalProperties: true
        aspects:
          type: array
          items:
            type: object
            additionalProperties: true
        title:
          type: string
        subtitle:
          type: string
        message:
          type: string
    AstrocartographyInsights:
      type: object
      properties:
        engine:
          type: object
          additionalProperties: true
        intention:
          type: object
          additionalProperties: true
        chartSummary:
          type: object
          additionalProperties: true
        precision:
          type: string
        location:
          type: object
          nullable: true
          properties:
            name:
              type: string
            country:
              type: string
              nullable: true
            source:
              type: string
              nullable: true
        notes:
          type: array
          items:
            type: string
        angularLines:
          type: array
          description: Low-precision planetární MC/IC meridiány pro vykreslení do mapy.
          items:
            type: object
            properties:
              planetId:
                type: string
              planetName:
                type: string
              planetSign:
                type: string
              angle:
                type: string
                enum: [MC, IC]
              angleLabel:
                type: string
              longitude:
                type: number
                minimum: -180
                maximum: 180
              map:
                type: object
                properties:
                  x:
                    type: number
                    minimum: 0
                    maximum: 100
              theme:
                type: string
        recommendations:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              city:
                type: string
              country:
                type: string
              score:
                type: integer
                minimum: 0
                maximum: 100
              tone:
                type: string
              primaryPlanet:
                type: object
                nullable: true
                additionalProperties: true
              map:
                type: object
                additionalProperties: true
              reason:
                type: string
              practicalUse:
                type: string
              caution:
                type: string
    AnalyticsEventRequest:
      type: object
      required: [eventName]
      properties:
        eventName:
          type: string
          example: cta_clicked
        name:
          type: string
          description: Legacy alias for eventName.
        feature:
          type: string
          nullable: true
        page:
          type: string
          nullable: true
        path:
          type: string
          nullable: true
        referrer:
          type: string
          nullable: true
        clientId:
          type: string
          nullable: true
        sessionId:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
    AnalyticsBatchRequest:
      type: object
      required: [events]
      properties:
        events:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/AnalyticsEventRequest'
    AnalyticsAck:
      type: object
      properties:
        success:
          type: boolean
        accepted:
          type: integer
    AnalyticsFeedbackSummary:
      type: object
      properties:
        total:
          type: integer
        yes:
          type: integer
        no:
          type: integer
        positiveRate:
          type: integer
          nullable: true
    AnalyticsSummary:
      type: object
      properties:
        pageViews:
          type: integer
        ctaClicks:
          type: integer
        signups:
          type: integer
        checkouts:
          type: integer
        clientErrors:
          type: integer
        serverErrors:
          type: integer
        feedback:
          $ref: '#/components/schemas/AnalyticsFeedbackSummary'
    AnalyticsCounterRow:
      type: object
      properties:
        key:
          type: string
        count:
          type: integer
    AnalyticsDailyRow:
      type: object
      properties:
        date:
          type: string
          format: date
        total:
          type: integer
        pageViews:
          type: integer
        ctaClicks:
          type: integer
        signups:
          type: integer
        checkouts:
          type: integer
        errors:
          type: integer
    AnalyticsErrorRow:
      type: object
      properties:
        id:
          type: string
        eventType:
          type: string
        feature:
          type: string
        path:
          type: string
        message:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    AnalyticsReport:
      type: object
      properties:
        periodDays:
          type: integer
        total:
          type: integer
        summary:
          $ref: '#/components/schemas/AnalyticsSummary'
        byEvent:
          type: object
          additionalProperties:
            type: integer
        topFeatures:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsCounterRow'
        topPaths:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsCounterRow'
        daily:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsDailyRow'
        recentErrors:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsErrorRow'
    FunnelMetricSummary:
      type: object
      properties:
        paywallViewed:
          type: integer
        checkoutStarted:
          type: integer
        subscriptionCompleted:
          type: integer
        oneTimeCompleted:
          type: integer
        invoicePaid:
          type: integer
        failures:
          type: integer
        refunds:
          type: integer
        cancelRequests:
          type: integer
        conversionRate:
          type: number
        paywallToCheckoutRate:
          type: number
        estimatedValueCzk:
          type: integer
    FunnelCounterRow:
      type: object
      properties:
        key:
          type: string
        count:
          type: integer
    FunnelDailyRow:
      type: object
      properties:
        date:
          type: string
          format: date
        paywallViewed:
          type: integer
        checkoutStarted:
          type: integer
        subscriptionCompleted:
          type: integer
        oneTimeCompleted:
          type: integer
        failures:
          type: integer
        refunds:
          type: integer
    FunnelSourceComparisonRow:
      type: object
      properties:
        key:
          type: string
        current:
          type: integer
        previous:
          type: integer
        delta:
          type: integer
        deltaPercent:
          type: number
          nullable: true
    FunnelSourceFeaturePreviousSegment:
      type: object
      properties:
        totalEvents:
          type: integer
        paywallViewed:
          type: integer
        checkoutStarted:
          type: integer
        purchaseCompleted:
          type: integer
        failures:
          type: integer
        paywallToCheckoutRate:
          type: number
        checkoutToPurchaseRate:
          type: number
    FunnelSourceFeatureSegment:
      type: object
      properties:
        source:
          type: string
        feature:
          type: string
        totalEvents:
          type: integer
        paywallViewed:
          type: integer
        checkoutStarted:
          type: integer
        purchaseCompleted:
          type: integer
        failures:
          type: integer
        paywallToCheckoutRate:
          type: number
        checkoutToPurchaseRate:
          type: number
        previous:
          $ref: '#/components/schemas/FunnelSourceFeaturePreviousSegment'
        paywallToCheckoutRateDelta:
          type: number
          nullable: true
        checkoutToPurchaseRateDelta:
          type: number
          nullable: true
    FunnelRecentEvent:
      type: object
      properties:
        id:
          type: string
        eventName:
          type: string
        source:
          type: string
          nullable: true
        feature:
          type: string
          nullable: true
        planId:
          type: string
          nullable: true
        planType:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    FunnelReport:
      type: object
      properties:
        generatedAt:
          type: string
          format: date-time
        days:
          type: integer
        since:
          type: string
          format: date-time
          nullable: true
        previousSince:
          type: string
          format: date-time
          nullable: true
        periodEnd:
          type: string
          format: date-time
          nullable: true
        limit:
          type: integer
        totalEvents:
          type: integer
        metrics:
          $ref: '#/components/schemas/FunnelMetricSummary'
        byEvent:
          type: object
          additionalProperties:
